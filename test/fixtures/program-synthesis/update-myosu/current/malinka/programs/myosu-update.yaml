version: 1
program: myosu-update
target_repo: ../..
state_path: ../../.raspberry/myosu-update-state.json
max_parallel: 1
units:
- id: games
  title: Existing Game Surfaces
  output_root: ../../outputs/games
  artifacts:
  - id: poker_spec
    path: poker/spec.md
  - id: poker_review
    path: poker/review.md
  milestones:
  - id: poker_reviewed
    requires:
    - poker_spec
    - poker_review
  lanes:
  - id: poker
    kind: platform
    title: Poker Lane
    run_config: ../run-configs/bootstrap/poker.toml
    managed_milestone: poker_reviewed
    produces:
    - poker_spec
    - poker_review
    proof_profile: poker_bootstrap
