version: 1
program: myosu-services
target_repo: ../..
state_path: ../../.raspberry/myosu-services-state.json
max_parallel: 1
units:
  - id: miner
    title: Miner Service
    output_root: ../../outputs/miner/service
    artifacts:
      - id: spec
        path: spec.md
      - id: review
        path: review.md
    milestones:
      - id: reviewed
        requires: [spec, review]
    lanes:
      - id: service
        kind: service
        title: Miner Service Lane
        run_config: ../run-configs/services/miner-service.toml
        managed_milestone: reviewed
        proof_profile: miner_service_bootstrap
        checks:
          - label: chain_pallet_review_ready
            kind: precondition
            type: file_exists
            path: ../../outputs/chain/pallet/review.md
        produces: [spec, review]
