[profile.default]
# Unit tests: flag SLOW after 2s, hard-kill after 4s
slow-timeout = { period = "2s", terminate-after = 2 }

[[profile.default.overrides]]
filter = 'package(fabro-cli) and (test(dry_run_writes_jsonl_and_live_json) or test(cli_run))'
slow-timeout = { period = "4s", terminate-after = 2 }

[profile.e2e]
# E2E (ignored) tests: flag SLOW after 10s, hard-kill after 30s
slow-timeout = { period = "10s", terminate-after = 3 }
