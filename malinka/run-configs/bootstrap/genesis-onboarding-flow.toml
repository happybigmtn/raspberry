version = 1
graph = "../../workflows/bootstrap/genesis-onboarding-flow.fabro"
goal = '''
Genesis Onboarding Flow

Bootstrap the first honest reviewed slice for this frontier.

Inputs:
- `README.md`
- `SPEC.md`
- `PLANS.md`
- `AGENTS.md`
- `CLAUDE.md`
- `genesis/plans/001-master-plan.md`

Current frontier tasks:
- Make sure the CLI surface operators run actually exposes `fabro synth`
- Fix genesis/create runtime handoff so generated workflows validate without local prompt shims
- Add validation step after genesis that confirms package health
- Test on an unfamiliar open-source repo
- Write operator quickstart documentation

Required durable artifacts:
- `outputs/genesis-onboarding-flow/spec.md`
- `outputs/genesis-onboarding-flow/review.md`
'''
directory = "../../.."

[llm]
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
[llm.fallbacks]
minimax = ["kimi-k2.5", "claude-opus-4-6"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
MINIMAX_API_KEY = "${env.MINIMAX_API_KEY}"
KIMI_API_KEY = "${env.KIMI_API_KEY}"

[pull_request]
enabled = false

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
