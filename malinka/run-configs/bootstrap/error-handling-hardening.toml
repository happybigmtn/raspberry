version = 1
graph = "../../workflows/bootstrap/error-handling-hardening.fabro"
goal = '''
Error Handling Hardening

Bootstrap the first honest reviewed slice for this frontier.

Inputs:
- `README.md`
- `SPEC.md`
- `PLANS.md`
- `AGENTS.md`
- `CLAUDE.md`
- `genesis/plans/001-master-plan.md`

Current frontier tasks:
- Audit the autodev critical path for unwrap() calls
- Replace unwrap() calls in raspberry-supervisor
- Replace unwrap() calls in fabro-workflows execution path
- Replace unwrap() calls in fabro-synthesis render path
- Add error context to the 50 most dangerous unwrap() sites
- Run autodev for 100 cycles and confirm zero engine panics

Required durable artifacts:
- `outputs/error-handling-hardening/spec.md`
- `outputs/error-handling-hardening/review.md`
'''
directory = "../../.."

[llm]
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
[llm.fallbacks]
minimax = ["kimi-k2.5", "claude-opus-4-6"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
MINIMAX_API_KEY = "${env.MINIMAX_API_KEY}"
KIMI_API_KEY = "${env.KIMI_API_KEY}"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
