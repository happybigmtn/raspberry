version = 1
graph = "../../workflows/bootstrap/workspace-integration-verification.fabro"
goal = '''
Workspace Integration Verification

Bootstrap the first honest reviewed slice for this frontier.

Inputs:
- `README.md`
- `SPEC.md`
- `PLANS.md`
- `AGENTS.md`
- `CLAUDE.md`
- `genesis/plans/001-master-plan.md`

Current frontier tasks:
- Add integration proof profile to render.rs
- Generate workspace-verify lanes for multi-child units
- Add BlueprintProtocol struct and protocol lane generation
- Add consistency challenge prompts for integration profile
- Validate on rXMRbro with workspace-verify lane

Required durable artifacts:
- `outputs/workspace-integration-verification/spec.md`
- `outputs/workspace-integration-verification/review.md`
'''
directory = "../../.."

[llm]
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
[llm.fallbacks]
minimax = ["kimi-k2.5", "claude-opus-4-6"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
MINIMAX_API_KEY = "${env.MINIMAX_API_KEY}"
KIMI_API_KEY = "${env.KIMI_API_KEY}"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
