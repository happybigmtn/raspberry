version = 1
graph = "../../workflows/bootstrap/parent-review-gauntlet-rollout.fabro"
goal = '''
Parent Review Gauntlet Live Rollout

Bootstrap the first honest reviewed slice for this frontier.

Inputs:
- `README.md`
- `SPEC.md`
- `PLANS.md`
- `AGENTS.md`
- `CLAUDE.md`
- `genesis/plans/001-master-plan.md`

Current frontier tasks:
- Run autodev until at least one plan reaches parent gauntlet stages
- Validate preflight, deep review, and adjudication produce real artifacts
- Validate conditional stages (design-review, qa, cso) trigger correctly
- Decide on dedicated parent workflow template vs recurring-report reuse
- Ship-readiness gate produces go/no-go verdict

Required durable artifacts:
- `outputs/parent-review-gauntlet-rollout/spec.md`
- `outputs/parent-review-gauntlet-rollout/review.md`
'''
directory = "../../.."

[llm]
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
[llm.fallbacks]
minimax = ["kimi-k2.5", "claude-opus-4-6"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
MINIMAX_API_KEY = "${env.MINIMAX_API_KEY}"
KIMI_API_KEY = "${env.KIMI_API_KEY}"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
