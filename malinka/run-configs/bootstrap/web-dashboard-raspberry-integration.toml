version = 1
graph = "../../workflows/bootstrap/web-dashboard-raspberry-integration.fabro"
goal = '''
Web Dashboard Raspberry Integration

Bootstrap the first honest reviewed slice for this frontier.

Inputs:
- `README.md`
- `SPEC.md`
- `PLANS.md`
- `AGENTS.md`
- `CLAUDE.md`
- `genesis/plans/001-master-plan.md`

Current frontier tasks:
- Add Raspberry plan-matrix API endpoint to fabro-api
- Add autodev status API endpoint to fabro-api
- Build plan matrix component in fabro-web
- Build lane detail component with review scores
- Connect SSE event stream for live updates
- Design review against DESIGN.md

Required durable artifacts:
- `outputs/web-dashboard-raspberry-integration/spec.md`
- `outputs/web-dashboard-raspberry-integration/review.md`
'''
directory = "../../.."

[llm]
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
[llm.fallbacks]
minimax = ["kimi-k2.5", "claude-opus-4-6"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
MINIMAX_API_KEY = "${env.MINIMAX_API_KEY}"
KIMI_API_KEY = "${env.KIMI_API_KEY}"

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
