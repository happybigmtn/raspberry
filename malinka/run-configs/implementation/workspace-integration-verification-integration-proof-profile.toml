version = 1
graph = "../../workflows/implementation/workspace-integration-verification-integration-proof-profile.fabro"
goal = '''
Integration Proof Profile

Child work item of plan: Workspace Integration Verification

Proof commands:
- `cargo nextest run -p fabro-synthesis -- profile integration`

Required durable artifacts:
- `spec.md`
- `review.md`
'''
directory = "../../.."

[llm]
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
[llm.fallbacks]
minimax = ["kimi-k2.5", "claude-opus-4-6"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
MINIMAX_API_KEY = "${env.MINIMAX_API_KEY}"
KIMI_API_KEY = "${env.KIMI_API_KEY}"

[pull_request]
enabled = false

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
