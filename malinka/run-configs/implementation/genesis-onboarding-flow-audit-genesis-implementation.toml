version = 1
graph = "../../workflows/implementation/genesis-onboarding-flow-audit-genesis-implementation.fabro"
goal = '''
Audit Genesis Implementation

Child work item of plan: Genesis Onboarding Flow

Proof commands:
- `cargo nextest run -p fabro-cli -- synth genesis detection`
- `cargo nextest run -p fabro-synthesis -- genesis validation`

Required durable artifacts:
- `implementation.md`
- `verification.md`
- `quality.md`
- `promotion.md`
- `integration.md`
'''
directory = "../../.."

[llm]
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
[llm.fallbacks]
minimax = ["kimi-k2.5", "claude-opus-4-6"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
MINIMAX_API_KEY = "${env.MINIMAX_API_KEY}"
KIMI_API_KEY = "${env.KIMI_API_KEY}"

[pull_request]
enabled = false

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
