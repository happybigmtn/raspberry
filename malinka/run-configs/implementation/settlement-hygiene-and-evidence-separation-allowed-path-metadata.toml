version = 1
graph = "../../workflows/implementation/settlement-hygiene-and-evidence-separation-allowed-path-metadata.fabro"
goal = '''
Allowed Path Metadata

Child work item of plan: Settlement Hygiene and Evidence Separation

Proof commands:
- `cargo nextest run -p fabro-config -- integration allowed_paths`
- `cargo nextest run -p fabro-workflows -- direct_integration allowed`

Required durable artifacts:
- `implementation.md`
- `verification.md`
- `quality.md`
