version = 1
graph = "../../workflows/implementation/greenfield-bootstrap-reliability-verify-scaffold-first-ordering.fabro"
goal = '''
Verify Scaffold First Ordering

Child work item of plan: Greenfield Bootstrap and Runtime Asset Reliability

Proof commands:
- `cargo nextest run -p fabro-synthesis -- bootstrap_verify`
- `cargo nextest run -p fabro-synthesis -- scaffold_first`

Required durable artifacts:
- `implementation.md`
- `verification.md`
- `quality.md`
- `promotion.md`
- `integration.md`
'''
directory = "../../.."

[llm]
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
[llm.fallbacks]
minimax = ["kimi-k2.5", "claude-opus-4-6"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "always"

[sandbox.env]
MINIMAX_API_KEY = "${env.MINIMAX_API_KEY}"
KIMI_API_KEY = "${env.KIMI_API_KEY}"

[pull_request]
enabled = false

[integration]
enabled = true
strategy = "squash"
target_branch = "origin/HEAD"
artifact_path = "../../../integration.md"
