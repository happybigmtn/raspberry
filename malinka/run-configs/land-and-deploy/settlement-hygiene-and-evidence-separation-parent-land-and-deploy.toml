version = 1
graph = "../../workflows/land-and-deploy/settlement-hygiene-and-evidence-separation-parent-land-and-deploy.fabro"
goal = '''
Deploy-aware verification for parent plan `settlement-hygiene-and-evidence-separation`.

This lane exists only for plans whose integrated surface suggests deploy or service exposure. Record what would be landed, what health evidence exists, and any canary or rollout blockers.

Required outputs:
- `deploy-verification.md`
- `promotion.md`
'''
directory = "../../.."

[llm]
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
[llm.fallbacks]
minimax = ["kimi-k2.5", "claude-opus-4-6"]

[sandbox]
provider = "local"

[sandbox.local]
worktree_mode = "clean"

[sandbox.env]
MINIMAX_API_KEY = "${env.MINIMAX_API_KEY}"
KIMI_API_KEY = "${env.KIMI_API_KEY}"
