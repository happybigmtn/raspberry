      3. Review generated plans
      4. Start autodev
      5. Monitor with TUI

      Write to `docs/guides/quickstart.mdx`.

      Proof command:

          test -f docs/guides/quickstart.mdx && wc -l docs/guides/quickstart.mdx

      Expected: >50 lines.

